<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الملابس الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-white border-b p-4 shadow-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">🛍️ متجر الأناقة</h1>
            <div class="flex gap-2">
                <button onclick="showPasswordModal()" class="bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-xs font-bold">⚙️ لوحة التحكم</button>
                <button onclick="toggleCart()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">🛒 السلة (<span id="cart-count">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
            <div class="text-center col-span-full py-10 text-slate-400" id="loading-text">جاري تحميل المنتجات من السيرفر... ⏳</div>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-slate-900/60 hidden justify-end z-50">
        <div class="bg-white w-full max-w-md h-full p-6 flex flex-col justify-between shadow-2xl">
            <div>
                <h3 class="text-lg font-bold border-b pb-4 mb-4">🛒 سلة المشتريات</h3>
                <div id="cart-items" class="space-y-3 overflow-y-auto max-h-[50vh]"></div>
            </div>
            <div class="space-y-4 border-t pt-4">
                <input type="text" id="client-name" placeholder="اسم المستلم" class="w-full bg-slate-50 border p-2.5 rounded-xl text-sm">
                <input type="text" id="client-address" placeholder="العنوان ورقم التليفون" class="w-full bg-slate-50 border p-2.5 rounded-xl text-sm">
                <div class="flex justify-between font-bold bg-slate-50 p-3 rounded-xl border">
                    <span>الإجمالي:</span>
                    <span id="cart-total" class="text-blue-600">0 جنيه</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">💬 طلب عبر الواتساب</button>
                <button onclick="toggleCart()" class="w-full bg-slate-100 text-slate-600 py-2 rounded-xl text-xs font-bold">إغلاق السلة</button>
            </div>
        </div>
    </div>

    <div id="password-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 text-center shadow-xl">
            <h3 class="text-lg font-bold mb-4">🔐 دخول صاحب المحل</h3>
            <input type="password" id="admin-pass-input" placeholder="••••••••" class="w-full p-3 border rounded-xl mb-4 text-center font-bold">
            <div class="flex gap-2">
                <button onclick="checkAdminPassword()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold">دخول</button>
                <button onclick="closePasswordModal()" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl max-h-[70vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-lg font-bold">🛠️ إدارة منتجات المتجر</h3>
                <button onclick="closeAdmin()" class="text-xl font-bold text-slate-400">✕</button>
            </div>
            <button onclick="addNewProductSlot()" class="w-full bg-indigo-50 text-indigo-600 py-2.5 rounded-xl font-bold text-xs border border-dashed border-indigo-200 mb-4">➕ إضافة منتج جديد</button>
            <div id="admin-fields-container" class="space-y-6"></div>
            <button type="button" onclick="saveAdminChanges()" id="save-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mt-6 shadow-lg">💾 حفظ وتحديث المتجر عند كل الناس</button>
        </div>
    </div>

    <script>
        // ⚙️ الإعدادات الـ ثنائية (الواتساب وباسورد لوحة التحكم)
        const MY_WHATSAPP = "201012345678"; 
        const ADMIN_PASSWORD = "A7AA"; 
        const MASTER_KEY = "$2a$10$KwBzIzoz05mXy34QmRKwfu.VDGLGHXkuRH2x1TtP8bn9W9HmZC7Sa";
        let BIN_URL = localStorage.getItem('photo_store_bin_url') || "";

        let products = [];
        let cart = [];
        const defaultProduct = [{ title: "تيشرت أوفر سايز أسود", price: 350, desc: "قطن 100% خامة ممتازة وثقيلة", img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" }];

        function initStore() {
            if (!BIN_URL) {
                products = defaultProduct;
                renderProducts();
            } else {
                loadProductsFromServer();
            }
        }

        function loadProductsFromServer() {
            fetch(BIN_URL, { method: "GET", headers: { "X-Master-Key": MASTER_KEY } })
            .then(res => res.json())
            .then(data => {
                products = data.record || defaultProduct;
                renderProducts();
            })
            .catch(() => { products = defaultProduct; renderProducts(); });
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            if(products.length === 0) {
                container.innerHTML = '<div class="text-center col-span-full py-10 text-slate-400">المتجر فارغ حالياً، افتح لوحة التحكم وأضف منتجاتك! 🚀</div>';
                return;
            }
            products.forEach((p) => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl border p-4 shadow-sm flex flex-col justify-between hover:shadow-md transition">
                        <img src="${p.img}" class="w-full h-44 object-cover rounded-xl mb-3" onerror="this.src='https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500'">
                        <div>
                            <h4 class="font-bold text-slate-900">${p.title}</h4>
                            <p class="text-slate-500 text-xs my-1">${p.desc}</p>
                            <p class="text-blue-600 font-bold mb-3">${p.price} جنيه</p>
                        </div>
                        <button onclick="addToCart('${p.title}', ${p.price})" class="w-full bg-slate-950 text-white py-2 rounded-xl text-xs font-bold">إضافة للسلة</button>
                    </div>`;
            });
        }

        // 🖼️ الحركة السحرية: اختيار الصورة وضغطها وتحويلها لكود نصي سحابي فوراً
        function handleImageUpload(input, index) {
            const file = input.files[0];
            if (!file) return;
            
            const preview = document.getElementById(`img-preview-${index}`);
            const hiddenInput = document.getElementById(`edit-img-${index}`);
            preview.src = "https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif"; // أنيميشن تحميل

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // ضغط أبعاد الصورة عشان تترفع في ثانية ومتحملش على السيرفر
                    canvas.width = 400; 
                    canvas.height = 400;
                    ctx.drawImage(img, 0, 0, 400, 400);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5); // ضغط جودة الصورة 50%
                    preview.src = compressedBase64;
                    hiddenInput.value = compressedBase64;
                }
            }
            reader.readAsDataURL(file);
        }

        function showPasswordModal() { document.getElementById('password-modal').classList.remove('hidden'); document.getElementById('password-modal').classList.add('flex'); }
        function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }

        function checkAdminPassword() {
            if (document.getElementById('admin-pass-input').value.trim() === ADMIN_PASSWORD) {
                closePasswordModal();
                document.getElementById('admin-modal').classList.remove('hidden');
                document.getElementById('admin-modal').classList.add('flex');
                renderAdminForm();
            } else { alert("رمز الدخول خاطئ!"); }
        }

        function renderAdminForm() {
            const formContainer = document.getElementById('admin-fields-container');
            formContainer.innerHTML = '';
            products.forEach((p, index) => {
                formContainer.innerHTML += `
                    <div class="product-slot bg-slate-50 p-3 rounded-xl border space-y-2 relative" data-index="${index}">
                        <button type="button" onclick="deleteSlot(${index})" class="absolute top-3 left-3 bg-red-50 text-red-500 text-xs px-2 py-1 rounded-lg">🗑️ حذف</button>
                        <h4 class="font-bold text-blue-600 text-xs">📦 منتج رقم ${index + 1}</h4>
                        <input type="text" id="title-${index}" value="${p.title}" class="w-full p-2 border rounded-lg text-sm" placeholder="اسم المنتج">
                        <input type="number" id="price-${index}" value="${p.price}" class="w-full p-2 border rounded-lg text-sm" placeholder="السعر">
                        <input type="text" id="desc-${index}" value="${p.desc}" class="w-full p-2 border rounded-lg text-sm" placeholder="الوصف">
                        
                        <div class="bg-white p-3 border rounded-xl flex items-center gap-4">
                            <img id="img-preview-${index}" src="${p.img}" class="w-14 h-14 object-cover rounded-lg border">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-slate-500 mb-1">اختر صورة من جهازك 📱</label>
                                <input type="file" accept="image/*" onchange="handleImageUpload(this, ${index})" class="text-xs w-full block text-slate-400 file:mr-4 file:py-1 file:px-2 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                            </div>
                            <input type="hidden" id="edit-img-${index}" value="${p.img}">
                        </div>
                    </div>`;
            });
        }

        function addNewProductSlot() {
            products.push({ title: "منتج جديد", price: 100, desc: "الوصف هنا", img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" });
            renderAdminForm();
        }

        function deleteSlot(index) { products.splice(index, 1); renderAdminForm(); }

        function saveAdminChanges() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "جاري رفع الصور والداتا للسيرفر السحابي... ⏳";

            let updatedList = [];
            const slots = document.querySelectorAll('.product-slot');
            slots.forEach((slot) => {
                const idx = slot.getAttribute('data-index');
                const titleVal = document.getElementById(`title-${idx}`).value.trim();
                const priceVal = Number(document.getElementById(`price-${idx}`).value);
                const descVal = document.getElementById(`desc-${idx}`).value.trim();
                const imgVal = document.getElementById(`edit-img-${idx}`).value.trim();
                if(titleVal) { updatedList.push({ title: titleVal, price: priceVal, desc: descVal, img: imgVal }); }
            });

            let method = BIN_URL ? "PUT" : "POST";
            let url = BIN_URL ? BIN_URL : "https://api.jsonbin.io/v3/b";
            let headers = { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY };
            if (method === "POST") headers["X-Bin-Private"] = "false";

            fetch(url, { method: method, headers: headers, body: JSON.stringify(updatedList) })
            .then(res => res.json())
            .then(data => {
                if (method === "POST" && data.metadata && data.metadata.id) {
                    BIN_URL = `https://api.jsonbin.io/v3/b/${data.metadata.id}`;
                    localStorage.setItem('photo_store_bin_url', BIN_URL);
                }
                products = updatedList;
                renderProducts();
                document.getElementById('admin-modal').classList.add('hidden');
                alert("تم رفع الصور بنجاح وتحديث المتجر فوراً عند كل الزباين! 🎉🚀");
            })
            .catch(() => alert("حدث خطأ أثناء الاتصال بالسيرفر السحابي."))
            .finally(() => { saveBtn.disabled = false; saveBtn.innerText = "💾 حفظ وتحديث المتجر عند كل الناس"; });
        }

        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function addToCart(name, price) { cart.push({ name, price }); document.getElementById('cart-count').innerText = cart.length; updateCartUI(); }
        
        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items'); itemsContainer.innerHTML = ''; let total = 0;
            cart.forEach((item) => { total += item.price; itemsContainer.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-sm border"><p class="font-bold">${item.name}</p><span class="text-blue-600 font-bold">${item.price} ج</span></div>`; });
            document.getElementById('cart-total').innerText = total + ' جنيه';
        }
        
        function checkout() {
            const name = document.getElementById('client-name').value.trim();
            const address = document.getElementById('client-address').value.trim();
            if(!name || !address || cart.length === 0) { alert('املأ البيانات أولاً!'); return; }
            let itemsText = cart.map(item => `- ${item.name} (${item.price} ج)`).join('\n');
            let total = document.getElementById('cart-total').innerText;
            let message = `🛒 *طلب جديد*\n\n👤 *الاسم:* ${name}\n📍 *العنوان:* ${address}\n\n📦 *المنتجات:*\n${itemsText}\n\n💰 *الإجمالي:* ${total}`;
            window.open(`https://wa.me/${MY_WHATSAPP}?text=${encodeURIComponent(message)}`, '_blank');
        }

        document.addEventListener("DOMContentLoaded", initStore);
    </script>
</body>
</html>
